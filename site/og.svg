<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <linearGradient id="o-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b3b3b"/>
      <stop offset="0.5" stop-color="#1a5a51"/>
      <stop offset="0.78" stop-color="#e8765a"/>
      <stop offset="1" stop-color="#ffba7d"/>
    </linearGradient>
    <radialGradient id="o-moon" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff1d6" stop-opacity="0.85"/><stop offset="1" stop-color="#fff1d6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="o-car" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff8369"/><stop offset="1" stop-color="#e8503f"/>
    </linearGradient>
    <radialGradient id="o-head" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffdca8" stop-opacity="0.9"/><stop offset="1" stop-color="#ffdca8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="o-shade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#06231f" stop-opacity="0.62"/><stop offset="0.6" stop-color="#06231f" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="630" fill="url(#o-sky)"/>

  <g fill="#fff1d6">
    <circle cx="760" cy="70" r="2.4"/><circle cx="900" cy="50" r="1.8"/><circle cx="1010" cy="95" r="2"/>
    <circle cx="1120" cy="60" r="1.8"/><circle cx="840" cy="120" r="1.6"/><circle cx="980" cy="160" r="1.6"/>
  </g>

  <circle cx="1050" cy="130" r="120" fill="url(#o-moon)"/>
  <circle cx="1050" cy="130" r="54" fill="#fff4dd"/>

  <!-- skyline -->
  <g fill="#0c3a37">
    <rect x="640" y="300" width="46" height="130"/>
    <rect x="694" y="250" width="38" height="180"/>
    <rect x="740" y="320" width="54" height="110"/>
    <rect x="800" y="220" width="36" height="210" rx="5"/>
    <rect x="844" y="290" width="46" height="140"/>
    <rect x="900" y="330" width="40" height="100"/>
  </g>
  <g fill="#ffd9a8" opacity="0.85">
    <rect x="705" y="266" width="5" height="8"/><rect x="716" y="266" width="5" height="8"/>
    <rect x="705" y="286" width="5" height="8"/><rect x="716" y="286" width="5" height="8"/>
    <rect x="809" y="236" width="5" height="8"/><rect x="820" y="236" width="5" height="8"/>
    <rect x="809" y="258" width="5" height="8"/><rect x="820" y="258" width="5" height="8"/>
  </g>

  <rect x="0" y="430" width="1200" height="200" fill="#10322d"/>

  <!-- house with lit window -->
  <g transform="translate(980,360)">
    <rect x="0" y="20" width="58" height="46" fill="#0a302e"/>
    <path d="M-9,20 L29,-8 L67,20 Z" fill="#0c3a37"/>
    <rect x="22" y="36" width="16" height="20" fill="#ffcf8a"/>
  </g>

  <!-- palm, far right -->
  <g transform="translate(1140,440) scale(1.25)">
    <path d="M0,0 q-6,-46 2,-92 q1,-6 7,-3 q-5,44 3,92 z" fill="#072b29"/>
    <g fill="#0a332f">
      <path d="M7,-92 q-36,-13 -66,2 q34,-27 66,-13 z"/>
      <path d="M7,-92 q-25,-31 -48,-41 q36,13 52,31 z"/>
      <path d="M7,-92 q-5,-41 5,-67 q10,33 3,65 z"/>
      <path d="M7,-92 q23,-31 52,-39 q-31,17 -44,41 z"/>
    </g>
  </g>

  <!-- car heading home -->
  <g transform="translate(700,560) scale(2.0)">
    <ellipse cx="104" cy="20" rx="112" ry="13" fill="#06201e" opacity="0.5"/>
    <ellipse cx="214" cy="-20" rx="66" ry="28" fill="url(#o-head)"/>
    <path d="M6,-12 Q6,-36 32,-38 Q58,-60 104,-60 Q154,-60 180,-38 Q204,-36 204,-14 Q204,-5 195,-5 L13,-5 Q6,-5 6,-12 Z" fill="url(#o-car)"/>
    <path d="M52,-40 Q72,-55 104,-55 Q138,-55 158,-40 L158,-39 L52,-39 Z" fill="#0c3a37"/>
    <rect x="102" y="-55" width="5" height="16" fill="#0a302e"/>
    <circle cx="198" cy="-18" r="5" fill="#ffe9c2"/>
    <circle cx="56" cy="-3" r="20" fill="#10302e"/><circle cx="56" cy="-3" r="9" fill="#2f6058"/>
    <circle cx="158" cy="-3" r="20" fill="#10302e"/><circle cx="158" cy="-3" r="9" fill="#2f6058"/>
  </g>

  <!-- left shade for text contrast -->
  <rect x="0" y="0" width="1200" height="630" fill="url(#o-shade)"/>

  <!-- text -->
  <text x="80" y="118" fill="#fff6ec" font-size="44" font-weight="700" letter-spacing="-1">volante</text>
  <text x="78" y="250" fill="#fff6ec" font-size="74" font-weight="700">Te llevamos a ti</text>
  <text x="78" y="338" font-size="74" font-weight="700"><tspan fill="#ff8369" font-style="italic">y a tu carro</tspan><tspan fill="#fff6ec"> a casa.</tspan></text>
  <text x="80" y="404" fill="#ffe6cf" font-size="30" font-family="Helvetica, Arial, sans-serif">Sin membresía · Sin mínimo · Precio fijo · Miami</text>
</svg>
