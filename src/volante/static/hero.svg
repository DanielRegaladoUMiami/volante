<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 460" role="img" aria-label="Un conductor de Volante lleva a un cliente y a su propio carro a casa, de noche, por una calle de Miami con palmeras y el skyline.">
  <defs>
    <linearGradient id="v-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b3b3b"/>
      <stop offset="0.48" stop-color="#1a5a51"/>
      <stop offset="0.74" stop-color="#e8765a"/>
      <stop offset="1" stop-color="#ffba7d"/>
    </linearGradient>
    <radialGradient id="v-moon" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff1d6" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#fff1d6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="v-car" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff8369"/>
      <stop offset="1" stop-color="#e8503f"/>
    </linearGradient>
    <linearGradient id="v-road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16433d"/>
      <stop offset="1" stop-color="#0a2724"/>
    </linearGradient>
    <radialGradient id="v-head" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffdca8" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffdca8" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="v-card"><rect x="0" y="0" width="520" height="460" rx="28"/></clipPath>
    <g id="v-palm">
      <path d="M0,0 q-6,-46 2,-92 q1,-6 7,-3 q-5,44 3,92 z" fill="#072b29"/>
      <g fill="#0a332f">
        <path d="M7,-92 q-36,-13 -66,2 q34,-27 66,-13 z"/>
        <path d="M7,-92 q-25,-31 -48,-41 q36,13 52,31 z"/>
        <path d="M7,-92 q-5,-41 5,-67 q10,33 3,65 z"/>
        <path d="M7,-92 q23,-31 52,-39 q-31,17 -44,41 z"/>
        <path d="M7,-92 q35,-11 62,4 q-37,-23 -64,10 z"/>
      </g>
      <circle cx="6" cy="-90" r="5" fill="#0a332f"/>
    </g>
  </defs>

  <g clip-path="url(#v-card)">
    <rect x="0" y="0" width="520" height="460" fill="url(#v-sky)"/>

    <g fill="#fff1d6">
      <circle cx="60" cy="58" r="2"/><circle cx="124" cy="38" r="1.5"/><circle cx="182" cy="78" r="1.8"/>
      <circle cx="250" cy="48" r="1.4"/><circle cx="300" cy="92" r="1.6"/><circle cx="470" cy="150" r="1.6"/>
      <circle cx="150" cy="118" r="1.3"/><circle cx="92" cy="150" r="1.4"/><circle cx="338" cy="44" r="1.5"/>
    </g>

    <circle cx="402" cy="92" r="86" fill="url(#v-moon)"/>
    <circle cx="402" cy="92" r="40" fill="#fff4dd"/>

    <!-- skyline -->
    <g fill="#0c3a37">
      <rect x="150" y="212" width="34" height="93"/>
      <rect x="190" y="182" width="28" height="123"/>
      <rect x="224" y="232" width="40" height="73"/>
      <rect x="270" y="162" width="26" height="143" rx="4"/>
      <rect x="302" y="206" width="34" height="99"/>
      <rect x="342" y="236" width="30" height="69"/>
    </g>
    <g fill="#ffd9a8" opacity="0.85">
      <rect x="197" y="192" width="4" height="6"/><rect x="206" y="192" width="4" height="6"/>
      <rect x="197" y="208" width="4" height="6"/><rect x="206" y="208" width="4" height="6"/>
      <rect x="277" y="174" width="4" height="6"/><rect x="286" y="174" width="4" height="6"/>
      <rect x="277" y="190" width="4" height="6"/><rect x="286" y="190" width="4" height="6"/>
      <rect x="310" y="216" width="4" height="6"/><rect x="319" y="216" width="4" height="6"/>
    </g>

    <!-- ground / road -->
    <rect x="0" y="300" width="520" height="160" fill="url(#v-road)"/>

    <!-- destination house, lit window -->
    <g transform="translate(366,250)">
      <rect x="0" y="16" width="46" height="36" fill="#0a302e"/>
      <path d="M-7,16 L23,-6 L53,16 Z" fill="#0c3a37"/>
      <rect x="17" y="28" width="13" height="16" fill="#ffcf8a"/>
    </g>

    <!-- road centre dashes (perspective toward the house) -->
    <g stroke="#ffcf8a" stroke-width="3" stroke-linecap="round" opacity="0.55">
      <line x1="262" y1="312" x2="258" y2="328"/>
      <line x1="250" y1="346" x2="240" y2="372"/>
      <line x1="224" y1="404" x2="206" y2="440"/>
    </g>

    <!-- palms -->
    <use href="#v-palm" transform="translate(58,302) scale(1.32)"/>
    <use href="#v-palm" transform="translate(486,306) scale(0.72)"/>

    <!-- car (foreground, heading home toward the lit house) -->
    <g transform="translate(118,398)">
      <ellipse cx="104" cy="20" rx="112" ry="13" fill="#06201e" opacity="0.55"/>
      <ellipse cx="214" cy="-20" rx="66" ry="28" fill="url(#v-head)"/>
      <path d="M6,-12 Q6,-36 32,-38 Q58,-60 104,-60 Q154,-60 180,-38 Q204,-36 204,-14 Q204,-5 195,-5 L13,-5 Q6,-5 6,-12 Z" fill="url(#v-car)"/>
      <path d="M52,-40 Q72,-55 104,-55 Q138,-55 158,-40 L158,-39 L52,-39 Z" fill="#0c3a37"/>
      <rect x="102" y="-55" width="5" height="16" fill="#0a302e"/>
      <path d="M16,-12 L194,-12" stroke="#c8412f" stroke-width="2" opacity="0.7"/>
      <circle cx="198" cy="-18" r="5" fill="#ffe9c2"/>
      <circle cx="10" cy="-18" r="4" fill="#ffb3a6"/>
      <circle cx="56" cy="-3" r="20" fill="#10302e"/><circle cx="56" cy="-3" r="9" fill="#2f6058"/>
      <circle cx="158" cy="-3" r="20" fill="#10302e"/><circle cx="158" cy="-3" r="9" fill="#2f6058"/>
    </g>
  </g>
</svg>
